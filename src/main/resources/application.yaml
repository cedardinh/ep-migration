spring:
  application:
    name: ep-migration
  datasource:
    url: jdbc:postgresql://127.0.0.1:15432/ep_migration
    username: ep_migration
    password: ep_migration
    driver-class-name: org.postgresql.Driver

mybatis:
  mapper-locations: classpath:/mappers/**/*.xml
  type-handlers-package: com.demo.server.epmigration.project.persistence

server:
  port: 8081

ep:
  chain:
    rpc-url: http://127.0.0.1:8546
    chain-id: 1337
    lifecycle-contract-address: ""
    signer-private-key: ""
    gas-price: 0
    gas-limit: 5000000
    persist-project-summary: true
